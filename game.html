<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="game.css">
    <title>Let's have some fun!</title>
</head>

<body>
    <div class="container">
        <div id="dynamic-cards" class="game-container">
            <div class="heading-container">
                <h1 class="gfg-heading">
                      Cisco's Love
                  </h1>
                <h2 class="game-heading">Click any card to flip it!</h2>
            </div>
            <div class="cards-container">
                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="1" src="images/1.jpg" class="card-image">
                </div>
                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="2" src="images/1.jpg" class="card-image">
                </div>

                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="3" src="images/2.jpg" class="card-image">
                </div>
                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="4" src="images/2.jpg" class="card-image">
                </div>

                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="5" src="images/bd.png" class="card-image">
                </div>
                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="6" src="images/bd.png" class="card-image">
                </div>

                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="7" src="images/dudu.png" class="card-image">
                </div>
                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="8" src="images/dudu.png" class="card-image">
                </div>

                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="9" src="images/bubu.png" class="card-image">
                </div>
                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="10" src="images/bubu.png" class="card-image">
                </div>

                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="11" src="images/bubududu.png" class="card-image">
                </div>
                <div class="card">
                    <img src="images/heart.png" class="outline-image">
                    <img id="12" src="images/bubududu.png" class="card-image">
                </div>
            </div>
            <div class="progress-container">
                <div class="move-counter">Moves: 0</div>
                <button onclick="window.location.href='index.html'" class="back-button">
                ←
                </button>
                <button id="restart" class="restart-button">
                      Restart Game
                  </button>
            </div>
        </div>
    </div>
    <div id="love-letter" class="love-letter-modal">
        <div class="love-letter-content">
            <h2>Congratulations! ❤️</h2>
            <p>
                You found all the pairs!<br>
                I’m so happy you played this little game with me.  
                Every card matched, just like us! Claim your kisses to me hihi 💌
            </p>
            <button id="close-letter">Close</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Baby ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hearts"></div>

<div class="container">
    <h1 class="title">Hi, Baby 💖</h1>
    <p class="subtitle">A special greeting card just for you</p>

    <div class="buttons">
        <button onclick="openAlbum()">📸 Album</button>
        <button onclick="openPlaylist()">🎵 Playlist</button>
        <button onclick="openLetters()">💌 Love Letters</button>
    </div>

    <!-- Album Modal -->
    <div id="album" class="modal">
        <span class="close" onclick="closeAlbum()">&times;</span>
        <div class="album-content" id="albumContent">
            <!-- Photos will be stacked here -->
        </div>
    </div>

    <!-- Playlist Modal -->
    <div id="playlist" class="modal">
        <span class="close" onclick="closePlaylist()">&times;</span>
        <div class="playlist-content">
            <div class="video-container" id="videoContainer">
                <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/lY5V4hSLWY8?si=DA3-OCNFegcP_yyh" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
            <p id="videoErrorMsg" style="color:white; text-align:center; display:none; font-size:1.2em;">
                Sorry, this video is not available for embedding. Playing default video instead.
            </p>
        </div>
    </div>

    <!-- Love Letters Modal -->
    <div id="letters" class="modal">
        <span class="close" onclick="closeLetters()">&times;</span>
        <div class="letters-content">
            <div class="letter" onclick="openLetter(0)">
                💌 My First Letter
            </div>
            <div class="letter" onclick="openLetter(1)">
                💌 My Second Letter
            </div>
            <div class="letter" onclick="openLetter(2)">
                💌 My Third Letter
            </div>
        </div>
        <div id="letterDisplay" class="letter-display" style="display:none;">
            <p id="letterText"></p>
            <button onclick="closeLetter()" style="margin-top:15px; padding:10px 20px; border-radius:15px; border:none; background:#ff85a2; color:white; font-family:'Comic Neue', cursive; cursor:pointer;">
                Close 💖
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
